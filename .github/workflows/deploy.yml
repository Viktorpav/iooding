name: Build and Deploy

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'k8s/**'
      - 'README.md'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run Tests
        run: |
          python manage.py test

  build-and-update-manifest:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Version Tag
        id: tag
        run: echo "sha_short=v$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: viktor2003/iooding:${{ steps.tag.outputs.sha_short }}, viktor2003/iooding:latest
          cache-from: type=registry,ref=viktor2003/iooding:buildcache
          cache-to: type=registry,ref=viktor2003/iooding:buildcache,mode=max

      - name: Smoke Test Image
        run: |
          docker run --rm --entrypoint python viktor2003/iooding:${{ steps.tag.outputs.sha_short }} \
            -c "import django; print('Django version:', django.get_version())"

      - name: Update Kubernetes Manifests
        run: |
          sed -i "s|image: viktor2003/iooding:.*|image: viktor2003/iooding:${{ steps.tag.outputs.sha_short }}|g" k8s/deployment.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          
          if ! git diff --staged --quiet; then
            git commit -m "Deploy: Update image to ${{ steps.tag.outputs.sha_short }} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          else
            echo "No changes to commit."
          fi
