name: Build and Deploy

on:
  push:
    branches: [master, main]
    paths-ignore: ['k8s/**', '**.md']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: viktor2003/iooding:latest, viktor2003/iooding:v${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Deploy
        run: |
          git config user.name "bot"
          git config user.email "bot@iooding.local"
          sed -i "s|image: viktor2003/iooding:.*|image: viktor2003/iooding:v${{ github.run_number }}|g" k8s/deployment.yaml
          git add k8s/deployment.yaml
          git commit -m "deploy v${{ github.run_number }} [skip ci]" && git push || echo "No changes"
