apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: iooding
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: iooding
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        longhorn.io/disable-replica-rebuild: "true"
    spec:
      # Fast pod deletion on node failure
      terminationGracePeriodSeconds: 10
      nodeSelector:
        infra.iooding.local/storage: "true"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: infra.iooding.local/worker
                    operator: In
                    values:
                      - "true"
      # Fast eviction tolerations
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 10

        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 10
      initContainers:
        - name: volume-permissions
          image: busybox
          command:
            [
              "sh",
              "-c",
              "mkdir -p /mnt/data/pgdata && chown -R 999:999 /mnt/data && chmod 700 /mnt/data/pgdata",
            ]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: postgres-data
              mountPath: /mnt/data
      containers:
        - name: postgres
          image: postgres:14-bullseye
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - shared_buffers=128MB
            - -c
            - max_connections=50
            - -c
            - work_mem=8MB
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              value: "iooding"
            - name: POSTGRES_USER
              value: "iooding"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iooding-secrets
                  key: db_password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata

          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "kill -TERM 1"]

          # Give DB up to 5 minutes to recover/replay logs before liveness probe kicks in
          startupProbe:
            tcpSocket:
              port: 5432
            periodSeconds: 5
            failureThreshold: 30

          # Aggressive health checks for fast failure detection
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "iooding", "-d", "iooding"]
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "iooding", "-d", "iooding"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: postgres-data
        labels:
          # Enable automatic backups (only for database)
          recurring-job-group.longhorn.io/important: enabled
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "longhorn-storage"
        resources:
          requests:
            storage: 1Gi
