apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iooding-ingress
  namespace: iooding
  annotations:
    cert-manager.io/cluster-issuer: "iooding-ca-issuer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    # ── Anti-buffering for real-time AI SSE streaming ──────────────────────
    # proxy-buffering off: each chunk forwarded immediately (no response buffering)
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # HTTP/1.1 required for chunked transfer encoding used by SSE streams
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - iooding.local
      secretName: iooding-tls
  rules:
    - host: iooding.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iooding-service
                port:
                  number: 80
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iooding-service
                port:
                  number: 80
