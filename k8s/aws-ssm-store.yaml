apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-ssm
  namespace: iooding
spec:
  provider:
    aws:
      service: ParameterStore
      region: eu-central-1 # UPDATE THIS to your region if different
      auth:
        secretRef:
          awsSecretAccessKeySecretRef:
            name: aws-creds
            key: secret-access-key
          awsAccessKeyIDSecretRef:
            name: aws-creds
            key: access-key-id
---
# Placeholder for AWS credentials. 
# YOU MUST UPDATE THIS with your actual base64 encoded keys if not already set.
apiVersion: v1
kind: Secret
metadata:
  name: aws-creds
  namespace: iooding
type: Opaque
data:
  access-key-id: REPLACE_WITH_BASE64_ACCESS_KEY
  secret-access-key: REPLACE_WITH_BASE64_SECRET_KEY
